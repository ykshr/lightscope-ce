services:
  clickhouse:
    build:
      context: ./packages/clickhouse
    ports:
      - '8123:8123'
      - '9000:9000'
    environment:
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-lightscope}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-lightscope}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-lightscope}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:8123/ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./packages/api:/app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev"
    environment:
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-lightscope}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-lightscope}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-lightscope}
      - PORT=3000
    ports:
      - '3000:3000'
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3000/health']
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./packages/web:/app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev --host"
    environment:
      - VITE_API_ENDPOINT=${VITE_API_ENDPOINT:-http://localhost:3000}
    ports:
      - '5173:5173'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:5173/']
      interval: 5s
      timeout: 5s
      retries: 20

  mock-site:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./packages/e2e/fixtures:/usr/share/nginx/html
      - ./packages/script/dist:/usr/share/nginx/html/dist
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:80/']
      interval: 5s
      timeout: 5s
      retries: 20

  e2e:
    image: mcr.microsoft.com/playwright:v1.40.1-jammy
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - API_URL=http://localhost:3000
      - WEB_URL=http://localhost:5173
      - MOCK_SITE_URL=http://localhost:8080
    command: >
      sh -c "
        apt-get update && apt-get install -y socat &&
        socat TCP-LISTEN:3000,fork TCP:api:3000 &
        socat TCP-LISTEN:5173,fork TCP:web:5173 &
        socat TCP-LISTEN:8080,fork TCP:mock-site:80 &
        npm install -g pnpm && pnpm install && pnpm --filter lightscope-e2e run test:e2e
      "
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      mock-site:
        condition: service_healthy
    profiles:
      - e2e
