query TotalCountry($startDate: DateTime!, $endDate: DateTime!, $articleFilter: ArticleFilterInput) {
  trend(
    startDate: $startDate
    endDate: $endDate
    articleFilter: $articleFilter
    aggregation: { unit: TOTAL }
    metric: VISITS_VIEWS
  ) {
    categoryGeo {
      geoCountry
      value
    }
  }
}

query TotalCity(
  $startDate: DateTime!
  $endDate: DateTime!
  $articleFilter: ArticleFilterInput
  $geoCountry: String!
) {
  trend(
    startDate: $startDate
    endDate: $endDate
    articleFilter: $articleFilter
    aggregation: { unit: TOTAL }
    metric: VISITS_VIEWS
  ) {
    categoryGeo(includeGeoCountries: [$geoCountry]) {
      geoCity
      value
    }
  }
}
