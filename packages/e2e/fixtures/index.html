<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightscope E2E Test - Dummy Article</title>

    <!-- OpenGraph Metadata -->
    <meta property="og:title" content="E2E Test Article Title" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="http://localhost:3000/fixtures/index.html" />
    <meta property="og:image" content="http://localhost:3000/fixtures/test-image.jpg" />
    <meta
      property="og:description"
      content="This is a dummy article description for E2E testing purposes."
    />
    <meta property="og:site_name" content="Lightscope E2E Test Site" />
    <meta property="og:locale" content="en_US" />

    <!-- Article Metadata -->
    <meta property="article:published_time" content="2024-01-01T10:00:00Z" />
    <meta property="article:modified_time" content="2024-01-02T12:00:00Z" />
    <meta property="article:author" content="E2E Tester" />
    <meta property="article:author" content="Gemini CLI" />
    <meta property="article:section" content="Testing" />
    <meta property="article:tag" content="e2e" />
    <meta property="article:tag" content="test" />

    <!-- The script will be mounted here -->
    <script src="/dist/browser.js"></script>
  </head>
  <body>
    <h1>Lightscope E2E Test Page</h1>
    <p>This page is used for verifying the browser tracking script.</p>

    <button id="track-btn" data-analytics-id="manual-track-btn">Track Custom Event</button>

    <div style="margin-top: 20px">
      <button id="auto-track-btn">Auto Tracked Button</button>
    </div>

    <script>
      window.addEventListener('load', () => {
        console.log('Initializing Lightscope...');
        // The global name 'Lightscope' is defined in the build script
        // The class is exported as 'AnalyticsTracker'
        if (typeof Lightscope !== 'undefined' && Lightscope.AnalyticsTracker) {
          window.tracker = new Lightscope.AnalyticsTracker('http://localhost:3001/events', {
            token: 'test-token',
            site_name: 'e2e-test-site',
            heartbeat_interval_ms: 5000,
          });

          // Track initial page view
          window.tracker.trackPageView();
          console.log('Page view tracked');

          // Manual tracking
          document.getElementById('track-btn').addEventListener('click', () => {
            window.tracker.sendEvent('manual_click', {
              button_id: 'track-btn',
            });
            console.log('Manual click tracked');
          });
        } else {
          console.error('Lightscope library not loaded correctly');
        }
      });
    </script>
  </body>
</html>
