services:
  proxy:
    build:
      context: ../..
      dockerfile: packages/proxy/Dockerfile
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-lightscope}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-lightscope}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-lightscope}
      - PORT=3002
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - JWT_SECRET=${JWT_SECRET:-secret-for-dev-only-do-not-use-in-prod}
    ports:
      - '3002:3002'
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3001/health']
      interval: 5s
      timeout: 5s
      retries: 20
