query ArticleTrend(
  $startDate: DateTime!
  $endDate: DateTime!
  $articleFilter: ArticleFilterInput
  $limit: Int
  $page: Int
  $metric: Metric
  $isArticles: Boolean = false
  $isCategoryAge: Boolean = false
  $isCategoryAgeAge: Boolean = false
  $isCategoryApp: Boolean = false
  $isCategoryAppAppType: Boolean = false
  $isCategoryAppApp: Boolean = false
  $isCategoryDevice: Boolean = false
  $isCategoryDeviceDeviceType: Boolean = false
  $isCategoryDeviceDevice: Boolean = false
  $isCategoryGender: Boolean = false
  $isCategoryGenderGender: Boolean = false
  $isCategoryGeo: Boolean = false
  $isCategoryGeoContinent: Boolean = false
  $isCategoryGeoCountry: Boolean = false
  $isCategoryGeoSubdivision: Boolean = false
  $isCategoryReferrer: Boolean = false
  $isCategoryReferrerDomain: Boolean = false
  $isCategoryReferrerReferrer: Boolean = false
  $isCategoryUtm: Boolean = false
  $isCategoryUtmSource: Boolean = false
  $isCategoryUtmMedium: Boolean = false
  $isCategoryUtmCampaign: Boolean = false
  $includeAges: [String!]
  $excludeAges: [String!]
  $includeAppTypes: [String!]
  $excludeAppTypes: [String!]
  $includeApps: [String!]
  $excludeApps: [String!]
  $includeDeviceTypes: [String!]
  $excludeDeviceTypes: [String!]
  $includeDeviceVendors: [String!]
  $excludeDeviceVendors: [String!]
  $includeDevices: [String!]
  $excludeDevices: [String!]
  $includeGenders: [String!]
  $excludeGenders: [String!]
  $includeGeoContinents: [String!]
  $excludeGeoContinents: [String!]
  $includeGeoSubdivisions: [String!]
  $excludeGeoSubdivisions: [String!]
  $includeGeoCountries: [String!]
  $excludeGeoCountries: [String!]
  $includeGeoCities: [String!]
  $excludeGeoCities: [String!]
  $includeDomains: [String!]
  $excludeDomains: [String!]
  $includeReferrers: [String!]
  $excludeReferrers: [String!]
  $includeUtmSources: [String!]
  $excludeUtmSources: [String!]
  $includeUtmMediums: [String!]
  $excludeUtmMediums: [String!]
  $includeUtmCampaigns: [String!]
  $excludeUtmCampaigns: [String!]
) {
  trend(
    startDate: $startDate
    endDate: $endDate
    articleFilter: $articleFilter
    limit: $limit
    page: $page
    metric: $metric
    aggregation: { unit: AUTO }
  ) {
    ...TrendTemplate
  }
  total: trend(
    startDate: $startDate
    endDate: $endDate
    articleFilter: $articleFilter
    limit: $limit
    page: $page
    metric: $metric
    aggregation: { unit: TOTAL }
  ) {
    ...TrendTemplate
  }
}

fragment TrendTemplate on Trend {
  categoryAge(includeAges: $includeAges, excludeAges: $excludeAges) @include(if: $isCategoryAge) {
    ...TrendAnalytics
    age @include(if: $isCategoryAgeAge)
  }
  categoryApp(
    includeAppTypes: $includeAppTypes
    excludeAppTypes: $excludeAppTypes
    includeApps: $includeApps
    excludeApps: $excludeApps
  ) @include(if: $isCategoryApp) {
    ...TrendAnalytics
    appType @include(if: $isCategoryAppAppType)
    app @include(if: $isCategoryAppApp)
  }
  categoryDevice(
    includeDeviceTypes: $includeDeviceTypes
    excludeDeviceTypes: $excludeDeviceTypes
    includeDeviceVendors: $includeDeviceVendors
    excludeDeviceVendors: $excludeDeviceVendors
    includeDevices: $includeDevices
    excludeDevices: $excludeDevices
  ) @include(if: $isCategoryDevice) {
    ...TrendAnalytics
    deviceType @include(if: $isCategoryDeviceDeviceType)
    device @include(if: $isCategoryDeviceDevice)
  }
  categoryGender(includeGenders: $includeGenders, excludeGenders: $excludeGenders)
    @include(if: $isCategoryGender) {
    ...TrendAnalytics
    gender @include(if: $isCategoryGenderGender)
  }
  categoryGeo(
    includeGeoContinents: $includeGeoContinents
    excludeGeoContinents: $excludeGeoContinents
    includeGeoSubdivisions: $includeGeoSubdivisions
    excludeGeoSubdivisions: $excludeGeoSubdivisions
    includeGeoCountries: $includeGeoCountries
    excludeGeoCountries: $excludeGeoCountries
    includeGeoCities: $includeGeoCities
    excludeGeoCities: $excludeGeoCities
  ) @include(if: $isCategoryGeo) {
    ...TrendAnalytics
    geoContinent @include(if: $isCategoryGeoContinent)
    geoCountry @include(if: $isCategoryGeoCountry)
    geoSubdivision @include(if: $isCategoryGeoSubdivision)
  }
  categoryReferrer(
    includeDomains: $includeDomains
    excludeDomains: $excludeDomains
    includeReferrers: $includeReferrers
    excludeReferrers: $excludeReferrers
  ) @include(if: $isCategoryReferrer) {
    ...TrendAnalytics
    domain @include(if: $isCategoryReferrerDomain)
    referrer @include(if: $isCategoryReferrerReferrer)
  }
  categoryUtm(
    includeUtmSources: $includeUtmSources
    excludeUtmSources: $excludeUtmSources
    includeUtmMediums: $includeUtmMediums
    excludeUtmMediums: $excludeUtmMediums
    includeUtmCampaigns: $includeUtmCampaigns
    excludeUtmCampaigns: $excludeUtmCampaigns
  ) @include(if: $isCategoryUtm) {
    ...TrendAnalytics
    utmSource @include(if: $isCategoryUtmSource)
    utmMedium @include(if: $isCategoryUtmMedium)
    utmCampaign @include(if: $isCategoryUtmCampaign)
  }
  total @include(if: $isArticles) {
    ...TrendAnalytics
  }
}

fragment TrendAnalytics on TrendAnalyticsBase {
  date
  value
}
