version: '3.8'

services:
  clickhouse:
    build:
      context: ../clickhouse
    ports:
      - '8123:8123'
      - '9000:9000'
    environment:
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-lightscope}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-lightscope}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-lightscope}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../api:/app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev"
    environment:
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-lightscope}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-lightscope}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-lightscope}
      - PORT=3000
    ports:
      - '3000:3000'
    depends_on:
      - clickhouse

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../web:/app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev --host"
    environment:
      - VITE_API_ENDPOINT=${VITE_API_ENDPOINT:-http://localhost:3000}
    ports:
      - '60000:60000'
    depends_on:
      - api

  mock-site:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./fixtures:/usr/share/nginx/html
      - ../script/dist:/usr/share/nginx/html/dist
    depends_on:
      - api
