name: CI

on:
  pull_request:
    branches: ['main']
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Cache eslint
        uses: actions/cache@v4
        with:
          path: '**/.eslintcache'
          key: ${{ runner.os }}-eslint-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-eslint-

      - name: Cache prettier
        uses: actions/cache@v4
        with:
          path: '**/.prettier-cache'
          key: ${{ runner.os }}-prettier-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-prettier-

      - name: Cache vitest
        uses: actions/cache@v4
        with:
          path: '**/node_modules/.vite/vitest'
          key: ${{ runner.os }}-vitest-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-vitest-

      - name: Cache typescript
        uses: actions/cache@v4
        with:
          path: '**/*.tsbuildinfo'
          key: ${{ runner.os }}-typescript-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-typescript-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format:check
        run: pnpm run format:check

      - name: Run lint
        run: pnpm run lint

      - name: Run build
        run: pnpm run build

      - name: Run test
        run: pnpm run test

      - name: Run E2E tests
        run: pnpm run test:e2e
