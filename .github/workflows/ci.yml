name: CI

on:
  pull_request:
    branches: ['main']
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Cache eslint
        uses: actions/cache@v4
        with:
          path: '**/.eslintcache'
          key: ${{ runner.os }}-eslint-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-eslint-

      - name: Cache prettier
        uses: actions/cache@v4
        with:
          path: '**/.prettier-cache'
          key: ${{ runner.os }}-prettier-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-prettier-

      - name: Cache vitest
        uses: actions/cache@v4
        with:
          path: '**/node_modules/.vite/vitest'
          key: ${{ runner.os }}-vitest-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-vitest-

      - name: Cache typescript
        uses: actions/cache@v4
        with:
          path: '**/*.tsbuildinfo'
          key: ${{ runner.os }}-typescript-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-typescript-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "VERSION=$(pnpm --filter lightscope-e2e exec playwright --version | awk '{print $2}')" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.VERSION }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter lightscope-e2e exec playwright install --with-deps

      - name: Install Playwright OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter lightscope-e2e exec playwright install-deps

      - name: Run CI checks
        run: pnpm run ci
