services:
  proxy:
    build:
      context: ../..
      dockerfile: packages/proxy/Dockerfile
    environment:
      - PROXY_PORT=3002
      - PROXY_ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL:-http://clickhouse:8123}
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-lightscope}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-lightscope}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-lightscope}
      - CLICKHOUSE_INSERT_BATCH_SIZE=${CLICKHOUSE_INSERT_BATCH_SIZE:-1000}
      - CLICKHOUSE_INSERT_FLUSH_INTERVAL_MS=${CLICKHOUSE_INSERT_FLUSH_INTERVAL_MS:-200}
      - CLICKHOUSE_INSERT_MAX_TRY=${CLICKHOUSE_INSERT_MAX_TRY:-3}
      - MAXMIND_DB_PATH=${MAXMIND_DB_PATH:-data/GeoLite2-City.mmdb}
    ports:
      - '3002:3002'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3002/health']
      interval: 5s
      timeout: 5s
      retries: 20
