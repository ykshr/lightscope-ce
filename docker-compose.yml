services:
  clickhouse:
    build:
      context: ./packages/clickhouse
    ports:
      - '8123:8123'
      - '9000:9000'
    environment:
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-lightscope}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-lightscope}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-lightscope}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:8123/ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./packages/api:/app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev"
    environment:
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-lightscope}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-lightscope}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-lightscope}
      - PORT=3000
      - NO_AUTH_TOKEN=test-token
    ports:
      - '3000:3000'
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3000/health']
      interval: 5s
      timeout: 5s
      retries: 20

  proxy:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./packages/proxy:/app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev"
    environment:
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-lightscope}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-lightscope}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-lightscope}
      - PORT=3001
      - NO_AUTH_TOKEN=test-token
    ports:
      - '3001:3001'
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3001/health']
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./packages/web:/app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev --host"
    environment:
      - VITE_API_ENDPOINT=${VITE_API_ENDPOINT:-http://localhost:3000}
    ports:
      - '5173:5173'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:5173/']
      interval: 5s
      timeout: 5s
      retries: 20

  mock-site:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./packages/mock-site:/usr/share/nginx/html
      - ./packages/tracker/dist:/usr/share/nginx/html/dist
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:80/']
      interval: 5s
      timeout: 5s
      retries: 20
